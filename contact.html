<!DOCTYPE html>
<html>
<head>
<title>Contact - BrainBoost Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial;
background:#f4f7fb;
padding:40px;
}

.contact-box{
background:white;
max-width:500px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<div class="contact-box">
<h1>📩 Contact Us</h1>

<form>
<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea rows="5" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>
</form>

</div>

</body>
</html>
