<!DOCTYPE html>
<html>
<head>
  <title>Notes - BrainBoost Academy</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      min-height: 100vh;
    }

    .navbar {
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      padding: 15px 40px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #ffd700;
    }

    .container {
      padding: 50px 20px;
      text-align: center;
      color: white;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 40px;
      padding: 0 40px;
    }

    .note-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 25px;
      transition: 0.4s;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .note-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .note-card h3 {
      margin-bottom: 10px;
    }

    .note-card p {
      font-size: 14px;
      opacity: 0.9;
    }

    button {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background-color: #ffd700;
      color: black;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: white;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div><b>BrainBoost Academy</b></div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="notes.html">Notes</a>
    <a href="#">Quiz</a>
    <a href="#">Profile</a>
  </div>
</div>

<div class="container">
  <h1>📚 Study Notes</h1>
  <p>Choose your subject and boost your knowledge 🚀</p>

  <div class="notes-grid">

    <div class="note-card">
      <h3>📐 Mathematics</h3>
      <p>Algebra, Geometry, Trigonometry</p>
      <button>Explore</button>
    </div>

    <div class="note-card">
      <h3>🔬 Science</h3>
      <p>Physics, Chemistry, Biology</p>
      <button>Explore</button>
    </div>

    <div class="note-card">
      <h3>💻 Computer</h3>
      <p>HTML, CSS, JavaScript</p>
      <button>Explore</button>
    </div>

    <div class="note-card">
      <h3>📖 English</h3>
      <p>Grammar, Writing, Literature</p>
      <button>Explore</button>
    </div>

  </div>
</div>

</body>
</html>
