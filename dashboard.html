<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - BrainBoost Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
    }

    .navbar {
      background-color: #4e73df;
      padding: 15px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: inline-block;
      width: 350px;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background-color: #e74a3b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #c0392b;
    }

    #userEmail {
      color: gray;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div><b>BrainBoost Academy</b></div>
  <div class="nav-links">
    <a href="#">Dashboard</a>
   <a href="notes.html">Notes</a>
    <a href="#">Quiz</a>
    <a href="#">Profile</a>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Welcome 🎉</h2>
    <p id="userEmail"></p>
    <p>You are successfully logged in.</p>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQWDQL6F7UXbR3XRRsGzmoxeo54Wzy4Y0",
  authDomain: "brainboost-academy-9e080.firebaseapp.com",
  projectId: "brainboost-academy-9e080",
  storageBucket: "brainboost-academy-9e080.firebasestorage.app",
  messagingSenderId: "910185183656",
  appId: "1:910185183656:web:d9fbf6d230a2babd44859d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText =
      "Logged in as: " + user.email;
  } else {
    window.location.href = "login.html";
  }
});

</script>

</body>
</html>
