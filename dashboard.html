<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - BrainBoost Academy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    #userEmail {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #4e73df;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #2e59d9;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Welcome 🎉</h1>
  <p id="userEmail"></p>
  <button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQWDQL6F7UXbR3XRRsGzmoxeo54Wzy4Y0",
  authDomain: "brainboost-academy-9e080.firebaseapp.com",
  projectId: "brainboost-academy-9e080",
  storageBucket: "brainboost-academy-9e080.firebasestorage.app",
  messagingSenderId: "910185183656",
  appId: "1:910185183656:web:d9fbf6d230a2babd44859d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText =
      "Logged in as: " + user.email;
  } else {
    window.location.href = "login.html";
  }
});

</script>

</body>
</html>
